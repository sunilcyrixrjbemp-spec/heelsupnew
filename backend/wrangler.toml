name = "heelsup-worker"
main = "src/index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# ── D1 Database ──────────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "heelsup-db"
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"
# Run: npx wrangler d1 create heelsup-db
# Then copy the database_id here

# ── R2 Storage ───────────────────────────────────────────────
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "heelsup-media"
# Run: npx wrangler r2 bucket create heelsup-media

# ── KV (Rate limiting + JWT blacklist) ───────────────────────
[[kv_namespaces]]
binding = "KV"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"
# Run: npx wrangler kv namespace create heelsup-kv

# ── Environment Variables ─────────────────────────────────────
[vars]
ENVIRONMENT = "production"
R2_PUBLIC_URL = "https://media.heelsup.in"
# Secrets (set via: npx wrangler secret put SECRET_NAME)
# JWT_SECRET        → random 64-char string
# RAZORPAY_KEY_ID   → from Razorpay dashboard
# RAZORPAY_KEY_SECRET
# ADMIN_SECRET      → one-time admin setup token

# ── Routes ───────────────────────────────────────────────────
# Uncomment after setting up your domain in Cloudflare
# [[routes]]
# pattern = "heelsup.in/api/*"
# zone_name = "heelsup.in"