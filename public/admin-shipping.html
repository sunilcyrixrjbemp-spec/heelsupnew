  <title>HeelsUp Admin — Shipping Management</title>
  <!--
  ============================================================
  PAGE: admin-shipping.html
  PURPOSE: Admin ke liye shipping zones, delivery charges aur courier settings manage karna.

  YE PAGE KYA KAREGA:

  1. SHIPPING ZONES:
     - Zone banao: e.g. "Rajasthan", "Metro Cities", "Rest of India", "Remote Areas"
     - Har zone mein pincodes add karo (bulk import ka option bhi)
     - Zone-wise delivery time set karo

  2. SHIPPING RATES:
     - Har zone ke liye rate set karo:
       - Flat rate (e.g. ₹49 flat)
       - Weight based (e.g. ₹30/kg)
       - Price based (e.g. Free above ₹999, ₹49 below)
     - Free shipping threshold global setting

  3. DELIVERY METHODS:
     - Standard Delivery (5-7 days)
     - Express Delivery (2-3 days)
     - Same-day Delivery (sirf specific pincodes)
     - Enable/disable per method

  4. COURIER PARTNERS:
     - Active couriers list: Delhivery, Shiprocket, BlueDart, etc.
     - AWB/tracking prefix settings

  5. COD SETTINGS:
     - COD enable/disable toggle (global + per-zone)
     - COD extra charge (e.g. ₹30)
     - COD order limit (e.g. max ₹10,000)

  6. BULK PINCODE MANAGEMENT:
     - CSV upload karo serviceable pincodes ka
     - Non-serviceable pincodes block karo

  LINKED FROM:
  - admin.html sidebar → Shipping
  - admin-orders.html → shipping label generate karne ke liye
  - admin-settings.html → "Shipping Settings" shortcut
  ============================================================
  -->
