  <!--
  ============================================================
  PAGE: admin-taxes.html
  PURPOSE: Admin ke liye GST aur tax settings manage karna.
           India mein GST compliance ke liye yeh page MANDATORY hai.

  YE PAGE KYA KAREGA:

  1. GST CONFIGURATION:
     - Store ka GSTIN number enter karna
     - GST registered hai ya nahi (toggle)
     - GST inclusive pricing ya exclusive (price mein GST include hai ya alag dikhao)

  2. TAX CATEGORIES / SLABS:
     - Default GST slabs: 0% / 5% / 12% / 18% / 28%
     - Footwear ke liye GST: ₹1000 se upar 18%, niche 5% (India rule)
     - Bags ke liye GST: 18%
     - Har product category ko correct tax slab se assign karo

  3. TAX RULES TABLE:
     | Category | Tax Rate | HSN Code | Notes              |
     | Heels    | 18%      | 6402     | Above ₹1000        |
     | Heels    | 5%       | 6402     | Up to ₹1000        |
     | Bags     | 18%      | 4202     | -                  |
     | Clutches | 18%      | 4202     | -                  |

  4. TAX REPORTS LINK:
     - "View Tax Report" → admin-reports.html#taxes pe redirect

  5. INVOICE SETTINGS:
     - GST invoice template settings
     - HSN code per product category

  LINKED FROM:
  - admin.html sidebar → Settings > Taxes
  - admin-settings.html → Tax section link
  - admin-reports.html → Tax reports
  ============================================================
  -->
