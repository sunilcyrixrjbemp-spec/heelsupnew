  <title>Reset Password – HeelsUp</title>
  <!--
  ============================================================
  PAGE: reset-password.html
  PURPOSE: Email ke reset link se aane ke baad naya password set karne ka page.

  YE PAGE KYA KAREGA:
  - URL me "token" parameter hoga (e.g. ?token=abc123xyz)
  - Do fields: "Naya Password" + "Confirm Password"
  - Submit pe backend API call hogi token verify karne ke liye
  - Success pe login.html redirect hoga with success toast
  - Agar token expired ho toh error message + forgot-password.html ka link

  URL PATTERN:
  reset-password.html?token=RESET_TOKEN_HERE

  FLOW:
  Email link click → reset-password.html?token=... → (success) → login.html

  BACKEND API:
  POST /api/auth/reset-password { token, new_password }
  ============================================================
  -->
