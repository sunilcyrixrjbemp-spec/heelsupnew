<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — HeelsUp</title>
  <meta name="description" content="Sign in to your HeelsUp account to track orders, manage wishlist and shop premium footwear."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;1,500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--gold:#c9a96e;--gold-dark:#8b6914;--error:#e53e3e;--font-body:'Inter',sans-serif;--font-heading:'Playfair Display',serif}
    body{font-family:var(--font-body);min-height:100vh;display:flex}
    .split{display:grid;grid-template-columns:1fr 1fr;min-height:100vh;width:100%}
    .split-left{position:relative;overflow:hidden}
    .split-left img{width:100%;height:100%;object-fit:cover}
    .split-left-overlay{position:absolute;inset:0;background:linear-gradient(135deg,rgba(0,0,0,0.78),rgba(139,105,20,0.35));display:flex;flex-direction:column;justify-content:space-between;padding:40px}
    .split-logo{font-family:var(--font-heading);font-size:2rem;color:var(--gold);text-decoration:none}
    .split-quote h2{font-family:var(--font-heading);font-size:2.2rem;color:#fff;line-height:1.3;margin-bottom:10px}
    .split-quote p{color:rgba(255,255,255,0.7);font-size:14px}
    .split-right{background:#fff;display:flex;align-items:center;justify-content:center;padding:40px 24px;overflow-y:auto}
    .form-box{width:100%;max-width:420px}
    .form-logo{display:none;font-family:var(--font-heading);font-size:1.8rem;color:var(--gold-dark);text-align:center;margin-bottom:20px}
    .form-box h1{font-family:var(--font-heading);font-size:1.9rem;color:#1a1a1a;margin-bottom:6px}
    .form-box .sub{color:#666;font-size:14px;margin-bottom:28px}
    .form-group{margin-bottom:18px}
    .form-group label{display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:6px}
    .form-group input{width:100%;padding:12px 14px;border:1.5px solid #d1d5db;border-radius:8px;font-size:14px;font-family:var(--font-body);outline:none;transition:border-color 0.2s;color:#111}
    .form-group input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,169,110,0.12)}
    .input-wrapper{position:relative}
    .input-wrapper input{padding-right:42px}
    .toggle-pw{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#666;font-size:14px}
    .row-between{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;font-size:13px;color:#555}
    .row-between a{color:var(--gold-dark);text-decoration:none;font-weight:500}
    .check-row{display:flex;align-items:center;gap:6px}
    .check-row input{accent-color:var(--gold-dark)}
    .btn-primary{width:100%;padding:13px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;font-family:var(--font-body);transition:opacity 0.2s}
    .btn-primary:hover{opacity:0.9}
    .btn-primary:disabled{opacity:0.6;cursor:not-allowed}
    .divider{display:flex;align-items:center;gap:12px;color:#9ca3af;font-size:13px;margin:18px 0}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:#e5e7eb}
    .link-row{text-align:center;font-size:14px;color:#555;margin-top:16px}
    .link-row a{color:var(--gold-dark);font-weight:500;text-decoration:none}
    .alert-box{padding:12px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none}
    .alert-error{background:#fef2f2;border:1px solid #fecaca;color:#c53030}
    @keyframes slideInRight{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
    @media(max-width:768px){.split{grid-template-columns:1fr}.split-left{display:none}.form-logo{display:block}}
  </style>
</head>
<body>
<div class="split">
  <div class="split-left">
    <img src="https://images.unsplash.com/photo-1596703263926-eb0762ee17e4?w=800&q=80" alt="HeelsUp"/>
    <div class="split-left-overlay">
      <a href="index.html" class="split-logo">HeelsUp</a>
      <div class="split-quote">
        <h2>Your Style,<br><em>Your Story</em></h2>
        <p>Premium ladies footwear crafted for the modern Indian woman.</p>
      </div>
    </div>
  </div>
  <div class="split-right">
    <div class="form-box">
      <div class="form-logo">HeelsUp</div>
      <h1>Welcome Back</h1>
      <p class="sub">Sign in to your account to continue shopping</p>

      <div class="alert-box alert-error" id="login-error"></div>

      <div class="form-group">
        <label for="login-email">Email Address</label>
        <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email"/>
      </div>
      <div class="form-group">
        <label for="login-password">Password</label>
        <div class="input-wrapper">
          <input type="password" id="login-password" placeholder="Your password" autocomplete="current-password"/>
          <button type="button" class="toggle-pw" onclick="togglePw()"><i class="fa-regular fa-eye"></i></button>
        </div>
      </div>
      <div class="row-between">
        <div class="check-row"><input type="checkbox" id="remember-me"/><label for="remember-me">Remember me</label></div>
        <a href="forgot-password.html">Forgot Password?</a>
      </div>

      <button class="btn-primary" id="btn-login" onclick="doLogin()">
        <span id="btn-login-text"><i class="fa-solid fa-right-to-bracket"></i> &nbsp;Sign In</span>
      </button>

      <div class="link-row">New to HeelsUp? <a href="register.html">Create Account</a></div>
    </div>
  </div>
</div>

<script src="app-config.js"></script>
<script src="app-auth.js"></script>
<script src="js/cart.js"></script>
<script>
  if (HeelsUpAuth.getUser()) {
    window.location = new URLSearchParams(location.search).get('redirect') || 'profile.html';
  }

  function togglePw() {
    const el = document.getElementById('login-password');
    const btn = document.querySelector('.toggle-pw i');
    el.type = el.type === 'password' ? 'text' : 'password';
    btn.className = el.type === 'text' ? 'fa-regular fa-eye-slash' : 'fa-regular fa-eye';
  }

  document.getElementById('login-password').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
  });

  async function doLogin() {
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const errBox = document.getElementById('login-error');
    errBox.style.display = 'none';

    if (!email || !password) { showErr('Email and password are required'); return; }

    const btn = document.getElementById('btn-login');
    const btnText = document.getElementById('btn-login-text');
    btn.disabled = true;
    btnText.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> &nbsp;Signing In…';

    try {
      const res = await HeelsUpAuth.api('/api/auth/login', {
        method: 'POST',
        body: JSON.stringify({ email, password })
      });
      HeelsUpAuth.setSession(res.token, res.user);
      const redirect = new URLSearchParams(location.search).get('redirect') || (res.user.role === 'admin' ? 'admin.html' : 'profile.html');
      window.location = redirect;
    } catch (err) {
      showErr(err.message || 'Invalid email or password');
    } finally {
      btn.disabled = false;
      btnText.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> &nbsp;Sign In';
    }
  }

  function showErr(msg) {
    const el = document.getElementById('login-error');
    el.textContent = '⚠️ ' + msg;
    el.style.display = 'block';
  }
</script>
</body>
</html>
